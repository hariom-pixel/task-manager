version: '3.8'

services:
  app:
    build: .
    ports:
      - '3001:3001'
    env_file:
      - .env
    depends_on:
      - redis
    command: node src/server.js

  worker:
    build: .
    command: node src/workers/emailWorker.js
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis
    # ports:
    #  - '6379:6379'